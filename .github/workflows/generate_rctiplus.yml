name: Generate RCTI+ Playlists

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths: 
      - 'generate_rctiplus.py'
      - 'merge_playlists.py'
      - '.github/workflows/generate_rctiplus.yml'

permissions:
  contents: write

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 🚀 Run RCTI+ Generator
        run: python generate_rctiplus.py

      - name: 🔗 Merge to IndihomeTV.m3u
        run: python merge_playlists.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/
          git add IndihomeTV.m3u

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
          fi