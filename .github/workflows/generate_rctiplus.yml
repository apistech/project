name: Generate RCTI+ Playlists

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths: 
      - 'generate_rctiplus.py'
      - 'merge_playlists.py'
      - '.github/workflows/generate_rctiplus.yml'

permissions:
  contents: write

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 🚀 Run RCTI+ Generator
        run: python generate_rctiplus.py

      - name: 🔗 Merge to IndihomeTV.m3u
        run: python merge_playlists.py
          
      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/
          git add IndihomeTV.m3u

          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "Last commit was by bot. Amending last commit..."
            git commit --amend --no-edit
            git push origin main --force
          else
            echo "Last commit was by user. Creating new bot commit..."
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi