name: Generate Master EPG Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_epg.yml'
      - 'epgs/custom.channels.xml'
      - 'generate_epg.py'

permissions:
  contents: write

concurrency:
  group: git-write-lock
  cancel-in-progress: false

jobs:
  build-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          pip install requests
          mkdir -p epgs

      - name: Clone IPTV-ORG EPG tool
        run: git clone --depth 1 https://github.com/iptv-org/epg.git epg-tool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'epg-tool/package-lock.json' # ⭐ Krusial agar tidak error

      - name: Install Node dependencies
        working-directory: epg-tool
        run: npm ci

      - name: Generate Base EPG (Fungsi 1)
        run: |
          cp epgs/custom.channels.xml epg-tool/sites/custom.channels.xml
          cd epg-tool
          npm run grab -- --channels=sites/custom.channels.xml --output=../epgs/guide.xml --maxConnections=8

      - name: Run EPG Scraper & Merger (Fungsi 2)
        env:
          M3U_URL: ${{ secrets.M3U_URL }}
        run: python generate_epg.py

      - name: Verify & Generate Index
        run: |
          if [ ! -f "epgs/guide.xml" ]; then
            echo "Unified guide.xml missing!" && exit 1
          fi
          python3 -c '
          import xml.etree.ElementTree as ET
          from pathlib import Path
          src, out = Path("epgs/custom.channels.xml"), Path("epgs/channels.txt")
          if src.exists():
              root = ET.parse(src).getroot()
              entries = sorted(set(f"{c.attrib[\"xmltv_id\"].strip()} \"{(c.text or \"\").strip()}\"" for c in root.findall("channel") if c.attrib.get("xmltv_id")), key=lambda x: x.lower())
              out.write_text("\n".join(entries), encoding="utf-8")
              print(f"✅ Generated channels.txt index with {len(entries)} items.")
          '

      - name: Auto Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 Auto-Update EPG $(date -u '+%Y-%m-%d %H:%M UTC')"
          file_pattern: 'epgs/*'
          disable_scaching: true