name: Generate Samsung TV Plus Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: 
      - 'samsung_update.py'
      - '.github/workflows/samsung_update.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Generate playlist and EPG files
      run: python samsung_update.py
      
    - name: Commit and Smart Push (Safe Anti-Bloat)
      run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            COMMIT_MSG="🔄 Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            
            # Cek author commit terakhir di GitHub
            LAST_AUTHOR=$(git log -1 --format='%ae')
            if [ "$LAST_AUTHOR" = "41898282+github-actions[bot]@users.noreply.github.com" ]; then
              echo "Last commit was by the bot. Amending commit to prevent history bloat..."
              git commit --amend -m "$COMMIT_MSG"
              git push --force origin main
            else
              echo "Last commit was by user. Creating a new standard commit..."
              git commit -m "$COMMIT_MSG"
              git push origin main
            fi
          fi