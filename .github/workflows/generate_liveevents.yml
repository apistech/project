name: Generate Live Events

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_liveevents.yml'
      - 'generate_liveevents.py'

permissions:
  contents: write

concurrency:
  group: git-write-lock
  cancel-in-progress: false

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Playlists
        run: python3 generate_liveevents.py

      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/ 2>/dev/null || true

          if git diff-index --quiet HEAD --; then
            echo "✅ No changes detected. Skipping commit."
            exit 0
          fi

          git fetch origin main
          git rebase origin/main || {
            echo "❌ Rebase failed. Aborting."
            git rebase --abort
            exit 1
         }

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "🔄 Last commit by bot. Amending..."
            git commit --amend --no-edit --date="$TIMESTAMP"
          else
            echo "🆕 Last commit by user. Creating new commit..."
            git commit -m "🔄 Auto-Update $TIMESTAMP"
          fi

          for i in 1 2 3; do
          if git push origin main; then
            echo "✅ Push berhasil."
            exit 0
          fi
            echo "⚠️ Push gagal (attempt $i/3). Fetching & rebasing..."
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done

          echo "❌ Push gagal setelah 3x percobaan."
          exit 1