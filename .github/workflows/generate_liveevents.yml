name: Generate Live Events

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/generate_liveevents.yml'
      - 'generate_liveevents.py'

permissions:
  contents: write

concurrency:
  group: git-write-lock
  cancel-in-progress: false

jobs:
  build-playlists:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          mkdir -p playlists

      - name: Generate Playlists
        run: python3 generate_liveevents.py

      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A playlists/

          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "Last commit was by bot. Amending last commit..."
            git reset --soft HEAD~1  # ⭐ unstage + keep changes
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main --force-with-lease
          else
            echo "Last commit was by user. Creating new bot commit..."
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"

            for i in 1 2 3; do
              if git push origin main; then
                echo "Push berhasil."
                break
              fi

              echo "Push gagal (attempt $i/3), fetch + rebase..."
              git fetch origin main
              git rebase origin/main

              if [ $i -eq 3 ]; then
                echo "[ERROR] Push gagal setelah 3x percobaan."
                exit 1
              fi
            done
          fi