name: Generate Live Events

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip3 install requests

      - name: 🎯 Run scraping script
        run: |
          curl -L -f -o events.m3u8 https://raw.githubusercontent.com/doms9/iptv/refs/heads/default/M3U8/events.m3u8 || exit 1
          mkdir -p playlists
          python3 generate_liveevents.py events.m3u8 playlists/live_events.m3u

      - name: Commit and Push (Keep History Clean)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add playlists/live_events.m3u

          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          LAST_AUTHOR=$(git log -1 --format='%ae')
          BOT_EMAIL="41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$LAST_AUTHOR" = "$BOT_EMAIL" ]; then
            echo "Last commit was by bot. Amending last commit..."
            git commit --amend --no-edit
            git push origin main --force
          else
            echo "Last commit was by user. Creating new bot commit..."
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi