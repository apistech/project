name: Generate FAST Service Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generate_playlists.py'
      - '.github/workflows/generate_playlists.yml'

permissions:
  contents: write

jobs:
  build-playlists:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml urllib3

      - name: Run Playlist Generation Script
        run: python generate_playlists.py
        env:
          ROKU_GROUP_FILTER: "all"   # ganti sesuai kebutuhan
          ROKU_GROUP_METHOD: "hybrid"   # ganti ke "api" atau "chno" kalo mau
          TCL_CATEGORY_FILTER: "all" # ganti sesuai kategori TCL

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          exit 0
            fi
            
            git commit -m "🔄 Auto-Update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push origin main
