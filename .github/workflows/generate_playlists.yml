name: Generate FAST Service Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generate_playlists.py'
      - '.github/workflows/generate_playlists.yml'

permissions:
  contents: write

jobs:
  build-playlists:
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml urllib3

      - name: Run Playlist Generation Script
        run: python generate_playlists.py
        env:
          ROKU_GROUP_FILTER: "all"   # ganti sesuai kebutuhan
          ROKU_GROUP_METHOD: "hybrid"   # ganti ke "api" atau "chno" kalo mau
          TCL_CATEGORY_FILTER: "all" # ganti sesuai kategori TCL
    
      - name: Commit and Smart Push (Safe Anti-Bloat)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p playlists
          git add -A playlists/

          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            COMMIT_MSG="🔄 Updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            
            # Cek author commit terakhir di GitHub
            LAST_AUTHOR=$(git log -1 --format='%ae')
            if [ "$LAST_AUTHOR" = "41898282+github-actions[bot]@users.noreply.github.com" ]; then
              echo "Last commit was by the bot. Amending commit to prevent history bloat..."
              git commit --amend -m "$COMMIT_MSG"
              git push --force origin main
            else
              echo "Last commit was by user. Creating a new standard commit..."
              git commit -m "$COMMIT_MSG"
              git push origin main
            fi
          fi